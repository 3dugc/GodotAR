plugins {
    id "com.android.library"
}

def godotAndroidVersion = findProperty("godotAndroidVersion") ?: "4.4.1.stable"
def arcoreVersion = findProperty("arcoreVersion") ?: "1.33.0"

android {
    namespace "org.godotengine.plugin.android.godotarcore"
    compileSdk 34

    defaultConfig {
        minSdk 24
        consumerProguardFiles "consumer-rules.pro"
    }
}

dependencies {
    compileOnly "org.godotengine:godot:${godotAndroidVersion}"
    implementation "com.google.ar:core:${arcoreVersion}"
}
